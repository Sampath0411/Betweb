<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stumps | Elite Cricket Exchange</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --pitch-dark: #0a0e14;
            --pitch-mid: #141a24;
            --pitch-light: #1e2636;
            --floodlight: #ffb84d;
            --floodlight-dim: #c47a1a;
            --stadium-glow: rgba(255, 184, 77, 0.15);
            --white: #f8f9fa;
            --gray: #8b95a8;
            --green: #2ecc71;
            --red: #ff4757;
            --glass: rgba(20, 26, 36, 0.85);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--pitch-dark);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Stadium Background Effect */
        .stadium-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(255, 184, 77, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(255, 184, 77, 0.08) 0%, transparent 40%),
                linear-gradient(180deg, var(--pitch-dark) 0%, var(--pitch-mid) 100%);
            z-index: -2;
        }

        .pitch-lines {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                repeating-linear-gradient(90deg, transparent, transparent 48px, rgba(255, 184, 77, 0.03) 48px, rgba(255, 184, 77, 0.03) 49px);
            z-index: -1;
        }

        /* Auth Page */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        .brand-mark {
            text-align: center;
            margin-bottom: 48px;
        }

        .brand-mark h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 72px;
            letter-spacing: 8px;
            color: var(--white);
            text-shadow: 0 0 60px rgba(255, 184, 77, 0.4);
            margin-bottom: 8px;
        }

        .brand-mark p {
            color: var(--gray);
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .tab-switch {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            padding: 4px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            background: transparent;
            color: var(--gray);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--floodlight);
            color: var(--pitch-dark);
        }

        .input-field {
            margin-bottom: 20px;
        }

        .input-field label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray);
        }

        .input-field input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--white);
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .input-field input:focus {
            outline: none;
            border-color: var(--floodlight);
            background: rgba(255, 184, 77, 0.05);
        }

        .btn-floodlight {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--floodlight), var(--floodlight-dim));
            border: none;
            border-radius: 12px;
            color: var(--pitch-dark);
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(255, 184, 77, 0.3);
        }

        .btn-floodlight:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(255, 184, 77, 0.4);
        }

        /* App Layout */
        .app-layout {
            display: none;
            min-height: 100vh;
        }

        .app-layout.active {
            display: grid;
            grid-template-columns: 280px 1fr;
        }

        /* Sidebar */
        .sidebar {
            background: linear-gradient(180deg, var(--pitch-mid), var(--pitch-dark));
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            margin-bottom: 48px;
        }

        .sidebar-brand h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            letter-spacing: 4px;
        }

        .sidebar-brand span {
            color: var(--floodlight);
        }

        .nav-menu {
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            margin-bottom: 8px;
            border-radius: 12px;
            color: var(--gray);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255, 184, 77, 0.1);
            color: var(--floodlight);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wallet-pill {
            margin-top: auto;
            padding: 20px;
            background: linear-gradient(135deg, rgba(255, 184, 77, 0.15), rgba(196, 122, 26, 0.1));
            border: 1px solid rgba(255, 184, 77, 0.2);
            border-radius: 16px;
        }

        .wallet-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gray);
            margin-bottom: 4px;
        }

        .wallet-amount {
            font-size: 28px;
            font-weight: 700;
            color: var(--floodlight);
        }

        /* Main Content */
        .main-content {
            padding: 32px 40px;
            overflow-y: auto;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--gray);
            font-size: 14px;
        }

        /* Match Cards */
        .match-grid {
            display: grid;
            gap: 20px;
        }

        .match-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--floodlight), transparent);
            opacity: 0.5;
        }

        .match-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 184, 77, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .match-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--green);
            margin-bottom: 20px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .teams-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .team {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .team-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--pitch-light), var(--pitch-mid));
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: var(--floodlight);
        }

        .team-name {
            font-size: 18px;
            font-weight: 600;
        }

        .vs-divider {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            color: var(--gray);
            letter-spacing: 4px;
        }

        .odds-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .odds-btn {
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--white);
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .odds-btn:hover {
            background: rgba(255, 184, 77, 0.1);
            border-color: var(--floodlight);
        }

        .odds-label {
            font-size: 12px;
            color: var(--gray);
            margin-bottom: 4px;
        }

        .odds-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--floodlight);
        }

        /* Mobile Nav */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--pitch-mid);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            z-index: 100;
        }

        .mobile-nav-items {
            display: flex;
            justify-content: space-around;
        }

        .mobile-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            color: var(--gray);
            font-size: 11px;
            cursor: pointer;
        }

        .mobile-nav-item.active {
            color: var(--floodlight);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .app-layout.active {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: none;
            }
            .mobile-nav {
                display: block;
            }
            .main-content {
                padding-bottom: 100px;
            }
        }

        @media (max-width: 640px) {
            .brand-mark h1 {
                font-size: 52px;
            }
            .glass-card {
                padding: 28px;
            }
            .teams-row {
                flex-direction: column;
                gap: 16px;
            }
            .vs-divider {
                transform: rotate(90deg);
            }
        }

        /* Utility */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="stadium-bg"></div>
    <div class="pitch-lines"></div>

    <!-- Auth Page -->
    <div id="authPage" class="auth-page">
        <div class="auth-container">
            <div class="brand-mark">
                <h1>STUMPS</h1>
                <p>Elite Cricket Exchange</p>
            </div>

            <div class="glass-card">
                <div class="tab-switch">
                    <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
                    <button class="tab-btn" onclick="switchTab('register')">Register</button>
                </div>

                <form id="loginForm">
                    <div class="input-field">
                        <label>Username</label>
                        <input type="text" id="loginUsername" placeholder="Enter username" required>
                    </div>
                    <div class="input-field">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn-floodlight">Enter Stadium</button>
                </form>

                <form id="registerForm" class="hidden">
                    <div class="input-field">
                        <label>Full Name</label>
                        <input type="text" id="regName" placeholder="Your name" required>
                    </div>
                    <div class="input-field">
                        <label>Username</label>
                        <input type="text" id="regUsername" placeholder="Choose username" required>
                    </div>
                    <div class="input-field">
                        <label>Password</label>
                        <input type="password" id="regPassword" placeholder="Create password" required>
                    </div>
                    <div class="input-field">
                        <label>Referral Code (Optional)</label>
                        <input type="text" id="regReferral" placeholder="Friend's code">
                    </div>
                    <button type="submit" class="btn-floodlight">Join the Game</button>
                </form>
            </div>
        </div>
    </div>

    <!-- App Layout -->
    <div id="appLayout" class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h2>STUMPS<span>.</span></h2>
            </div>

            <nav class="nav-menu">
                <div class="nav-item active" onclick="showView('matches')">
                    <div class="nav-icon">🏏</div>
                    <span>Matches</span>
                </div>
                <div class="nav-item" onclick="showView('bets')">
                    <div class="nav-icon">📋</div>
                    <span>My Bets</span>
                </div>
                <div class="nav-item" onclick="showView('wallet')">
                    <div class="nav-icon">💰</div>
                    <span>Wallet</span>
                </div>
                <div class="nav-item" onclick="showView('profile')">
                    <div class="nav-icon">👤</div>
                    <span>Profile</span>
                </div>
            </nav>

            <div class="wallet-pill">
                <div class="wallet-label">Balance</div>
                <div class="wallet-amount" id="walletBalance">₹0</div>
            </div>
        </aside>

        <main class="main-content">
            <!-- Matches View -->
            <div id="matchesView" class="view-section">
                <div class="page-header">
                    <h1>Live Matches</h1>
                    <p>Place your bets on ongoing cricket matches</p>
                </div>
                <div class="match-grid" id="matchList">
                    <!-- Matches loaded dynamically -->
                </div>
            </div>

            <!-- Other views... -->
        </main>
    </div>

    <!-- Mobile Nav -->
    <nav class="mobile-nav">
        <div class="mobile-nav-items">
            <div class="mobile-nav-item active" onclick="showView('matches')">
                <span>🏏</span>
                <span>Matches</span>
            </div>
            <div class="mobile-nav-item" onclick="showView('bets')">
                <span>📋</span>
                <span>Bets</span>
            </div>
            <div class="mobile-nav-item" onclick="showView('wallet')">
                <span>💰</span>
                <span>Wallet</span>
            </div>
            <div class="mobile-nav-item" onclick="showView('profile')">
                <span>👤</span>
                <span>Profile</span>
            </div>
        </div>
    </nav>

    <script>
        const API = window.location.origin;
        let token = localStorage.getItem('token');
        let currentUser = null;

        // Initialize
        if (token) {
            validateToken();
        }

        async function validateToken() {
            try {
                const res = await fetch(`${API}/api/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    currentUser = await res.json();
                    showApp();
                } else {
                    localStorage.removeItem('token');
                    token = null;
                }
            } catch (e) {
                // Stay on auth
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch(`${API}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    currentUser = data.user;
                    showApp();
                } else {
                    alert(data.error || 'Login failed');
                }
            } catch (e) {
                alert('Network error');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const referral = document.getElementById('regReferral').value;

            try {
                const res = await fetch(`${API}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, password, referral_code: referral })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('Registration successful! Please login.');
                    switchTab('login');
                } else {
                    alert(data.error || 'Registration failed');
                }
            } catch (e) {
                alert('Network error');
            }
        });

        function showApp() {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('appLayout').classList.add('active');
            document.getElementById('walletBalance').textContent = `₹${currentUser?.balance || 0}`;
            loadMatches();
        }

        function showView(view) {
            // Update nav active states
            document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(item => {
                item.classList.remove('active');
            });
        }

        async function loadMatches() {
            try {
                const res = await fetch(`${API}/api/matches`);
                if (res.ok) {
                    const matches = await res.json();
                    renderMatches(matches);
                }
            } catch (e) {
                console.error('Failed to load matches');
            }
        }

        function renderMatches(matches) {
            const container = document.getElementById('matchList');
            if (!matches.length) {
                container.innerHTML = '<p style="text-align: center; color: var(--gray); padding: 40px;">No live matches available</p>';
                return;
            }

            container.innerHTML = matches.map(match => `
                <div class="match-card">
                    <div class="match-status">
                        <div class="status-dot"></div>
                        LIVE NOW
                    </div>
                    <div class="teams-row">
                        <div class="team">
                            <div class="team-avatar">${match.team_a.charAt(0)}</div>
                            <div class="team-name">${match.team_a}</div>
                        </div>
                        <div class="vs-divider">VS</div>
                        <div class="team">
                            <div class="team-avatar">${match.team_b.charAt(0)}</div>
                            <div class="team-name">${match.team_b}</div>
                        </div>
                    </div>
                    <div class="odds-row">
                        <button class="odds-btn" onclick="placeBet(${match.id}, 'A', '${match.team_a}', ${match.odds_a})">
                            <div class="odds-label">${match.team_a}</div>
                            <div class="odds-value">${match.odds_a.toFixed(2)}</div>
                        </button>
                        <button class="odds-btn" onclick="placeBet(${match.id}, 'draw', 'Draw', ${match.odds_draw})">
                            <div class="odds-label">Draw</div>
                            <div class="odds-value">${match.odds_draw.toFixed(2)}</div>
                        </button>
                        <button class="odds-btn" onclick="placeBet(${match.id}, 'B', '${match.team_b}', ${match.odds_b})">
                            <div class="odds-label">${match.team_b}</div>
                            <div class="odds-value">${match.odds_b.toFixed(2)}</div>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function placeBet(matchId, pick, pickName, odds) {
            if (!token) {
                alert('Please login first');
                return;
            }
            const stake = prompt(`Enter stake amount for ${pickName} (odds: ${odds}):`);
            if (!stake || stake < 10) {
                alert('Minimum stake is ₹10');
                return;
            }

            try {
                const res = await fetch(`${API}/api/bets`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ match_id: matchId, pick, odds: parseFloat(odds), stake: parseInt(stake) })
                });
                const data = await res.json();
                if (res.ok) {
                    alert(`Bet placed! Potential win: ₹${data.payout}`);
                    validateToken();
                } else {
                    alert(data.error || 'Bet failed');
                }
            } catch (e) {
                alert('Network error');
            }
        }
    </script>
</body>
</html>
